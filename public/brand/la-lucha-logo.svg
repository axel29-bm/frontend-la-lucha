<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <!-- Background rectangle -->
  <rect width="320" height="160" fill="#1a1a1a" rx="4"/>

  <!-- Red accent bar top -->
  <rect x="0" y="0" width="320" height="6" fill="#c8102e"/>

  <!-- Red accent bar bottom -->
  <rect x="0" y="154" width="320" height="6" fill="#c8102e"/>

  <!-- "LA" text -->
  <text
    x="160"
    y="62"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="28"
    font-weight="bold"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="14"
  >LA</text>

  <!-- Decorative lines around main text -->
  <line x1="20" y1="76" x2="120" y2="76" stroke="#c8102e" stroke-width="2"/>
  <line x1="200" y1="76" x2="300" y2="76" stroke="#c8102e" stroke-width="2"/>

  <!-- "LUCHA" main title -->
  <text
    x="160"
    y="115"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="54"
    font-weight="bold"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="4"
  >LUCHA</text>

  <!-- Subtitle -->
  <text
    x="160"
    y="140"
    font-family="Arial, sans-serif"
    font-size="11"
    fill="#c8102e"
    text-anchor="middle"
    letter-spacing="6"
    font-weight="600"
  >SANGUCHERÍA CRIOLLA</text>
</svg>
